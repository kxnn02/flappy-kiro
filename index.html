<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Kiro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="steering-charge-container">
      <div id="steering-charge-bar"></div>
    </div>

    <canvas id="game-canvas" role="img" aria-label="Flappy Kiro game: waiting to start" aria-live="polite"></canvas>

    <!-- Start screen overlay for fade transitions -->
    <div id="start-overlay">
      <h1>Flappy Kiro</h1>
      <p>Press Space or Click to Start</p>
    </div>

    <!-- Pause overlay -->
    <div id="pause-overlay" style="display: none;">
      <span class="overlay-title">PAUSED</span>
    </div>

    <!-- Death recap overlay -->
    <div id="death-recap-overlay" style="display: none;">
      <span class="overlay-title">Game Over</span>
      <p id="death-recap-score">Score: 0</p>
      <p id="death-recap-highscore">High Score: 0</p>
      <p id="death-recap-new-high" class="new-high-score" style="display: none;">NEW HIGH SCORE</p>
      <p id="death-recap-countdown">Restarting in 3...</p>
      <button id="death-recap-restart" aria-label="Restart game" style="display: none;">Press Space or Tap to Restart</button>
    </div>

    <!-- Leaderboard overlay -->
    <div id="leaderboard-overlay" style="display: none;">
      <h2>Leaderboard</h2>
      <div id="leaderboard-list"></div>
      <div id="leaderboard-error" style="display: none;"></div>
      <div id="leaderboard-name-prompt" style="display: none;">
        <label for="leaderboard-name-input">Display Name:</label>
        <input id="leaderboard-name-input" type="text" maxlength="15" placeholder="3-15 alphanumeric">
        <button id="leaderboard-name-submit">Submit</button>
      </div>
      <button id="leaderboard-close">Close</button>
    </div>

    <!-- Score popup container for floating "+1" elements -->
    <div id="score-popup-container"></div>

    <button id="steering-activate-btn" aria-label="Activate steering mode" style="display: none;">Activate Steering</button>
  </div>

  <script defer src="app.js"></script>
</body>
</html>
